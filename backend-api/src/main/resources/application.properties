spring.application.name=backend-api
server.port=8080


spring.datasource.url=jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?user=postgres.jgntcrkhsodqvanqvycr&password=${SUPABASE_DB_PASSWORD}&prepareThreshold=0

# Note: Ensure you replace [YOUR-PASSWORD] in the string with your actual database password

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Settings
# We use 'validate' because you already created the tables perfectly in Supabase.
# This prevents Spring from accidentally deleting or altering your schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# --- Spring AI & Gemini Configuration ---
spring.ai.openai.api-key=${GEMINI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.chat.options.model=gemini-2.5-flash

spring.ai.openai.embedding.enabled=false

# --- 2. Local Model (Ollama) for Vector Embeddings ---
spring.ai.ollama.base-url=http://localhost:11434
# Explicitly turn OFF Ollama chat to prevent conflicts
spring.ai.ollama.chat.enabled=false
spring.ai.ollama.embedding.options.model=nomic-embed-text